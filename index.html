<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Mentor or Coach? | Story Learning &amp; Development</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:ital,wght@0,700;0,800;1,800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#EAF4FB;font-family:'Barlow',system-ui,sans-serif;color:#333}
#app{min-height:100vh}

/* ---------- Welcome overlay ---------- */
.welcome-overlay{position:fixed;inset:0;z-index:100;background:#EAF4FB;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .4s ease,visibility .4s ease}
.welcome-overlay.dismissed{opacity:0;visibility:hidden;pointer-events:none}
.welcome-inner{text-align:center;max-width:520px;padding:32px;animation:fadeIn .6s ease both}
.welcome-logo{margin:0 auto 28px}
.welcome-logo svg{height:44px;width:auto}
.welcome-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:52px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1.05}
.welcome-sub{color:#666;font-size:16px;line-height:1.7;margin-top:16px}
.welcome-btn{display:inline-flex;align-items:center;gap:10px;margin-top:28px;background:#0061AD;color:white;border:none;border-radius:24px;padding:14px 32px;font-family:'Barlow',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 8px 28px rgba(0,97,173,.25);transition:transform .15s ease,box-shadow .15s ease}
.welcome-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,97,173,.35)}
.welcome-btn:active{transform:scale(.97)}
.welcome-pulse{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.8);animation:pulse 1.8s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ---------- Page transitions ---------- */
.page{min-height:100vh;animation:pageIn .32s ease both}
@keyframes pageIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}

/* ---------- Header ---------- */
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px}
.header-left{display:flex;align-items:center;gap:16px}
.divider{width:1px;height:28px;background:#c8d8e8}
.tag{font-size:12px;font-weight:600;color:#8fa0b0;letter-spacing:.2em;text-transform:uppercase}
.logo{display:inline-flex;align-items:center;justify-content:center;height:40px}
.logo svg{height:36px;width:auto}
.header-right{display:flex;align-items:center;gap:12px}

/* Back / start-again button */
.back-btn{display:inline-flex;align-items:center;gap:8px;background:white;color:#0061AD;border:1.5px solid #d1e3f3;border-radius:20px;padding:8px 16px;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s ease}
.back-btn:hover{background:#f0f7fd;border-color:#0061AD}

/* ---------- Container ---------- */
.container{max-width:880px;margin:0 auto;padding:8px 32px 64px}
.title-block{text-align:center;margin:24px auto 8px;max-width:720px}
.title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:44px;font-weight:800;color:#004B86;letter-spacing:-.02em;line-height:1.1}
.subtitle{color:#666;font-size:16px;line-height:1.7;margin-top:14px}

/* ---------- Progress ---------- */
.progress-wrap{max-width:720px;margin:24px auto 32px;display:flex;align-items:center;gap:16px}
.progress-bar{flex:1;height:6px;background:#dce8f3;border-radius:6px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#0061AD,#009FA0);border-radius:6px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.progress-text{font-size:12px;color:#8fa0b0;font-weight:600;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}

/* ---------- Question card ---------- */
.q-card{background:white;border-radius:28px;padding:40px 36px;box-shadow:0 6px 24px rgba(0,97,173,.07);animation:fadeIn .35s ease both}
.q-section{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;color:#009FA0;letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px}
.q-section.mentoring{color:#0061AD}
.q-section.approach{color:#1A3A5C}
.q-text{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:30px;font-weight:800;color:#1A3A5C;line-height:1.2;letter-spacing:-.005em;margin-bottom:24px}
.q-hint{color:#7a8a99;font-size:14px;line-height:1.6;margin-bottom:24px;font-style:italic}

.q-options{display:flex;flex-direction:column;gap:10px}
.q-option{display:flex;align-items:center;gap:14px;background:#f6fafd;border:2px solid #e3edf6;border-radius:16px;padding:16px 20px;cursor:pointer;transition:all .18s ease;text-align:left;font-family:'Barlow',sans-serif;font-size:15.5px;color:#2a3a4a;font-weight:500;width:100%}
.q-option:hover{border-color:#9bc6e6;background:#eef6fc;transform:translateX(3px)}
.q-option.selected{border-color:#0061AD;background:#e8f2fb;color:#004B86;font-weight:600}
.q-option-dot{width:18px;height:18px;border-radius:50%;border:2px solid #b8cbdc;flex-shrink:0;transition:all .18s ease;position:relative}
.q-option.selected .q-option-dot{border-color:#0061AD;background:#0061AD}
.q-option.selected .q-option-dot::after{content:'';position:absolute;inset:3px;border-radius:50%;background:white}

/* ---------- Question nav ---------- */
.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.nav-btn{display:inline-flex;align-items:center;gap:8px;background:white;color:#0061AD;border:1.5px solid #d1e3f3;border-radius:24px;padding:12px 24px;font-family:'Barlow',sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:all .2s ease}
.nav-btn:hover:not(:disabled){background:#f0f7fd;border-color:#0061AD}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn.primary{background:#0061AD;color:white;border-color:#0061AD;box-shadow:0 6px 18px rgba(0,97,173,.2)}
.nav-btn.primary:hover:not(:disabled){background:#004B86;transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,97,173,.3)}

/* ---------- Intro screen ---------- */
.intro-card{background:white;border-radius:28px;padding:44px 40px;box-shadow:0 6px 24px rgba(0,97,173,.07);margin-top:8px}
.intro-card h2{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:26px;font-weight:800;color:#004B86;margin-bottom:14px}
.intro-card p{color:#555;line-height:1.75;font-size:15.5px;margin-bottom:14px}
.intro-list{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
@media(max-width:680px){.intro-list{grid-template-columns:1fr}}
.intro-step{background:#f6fafd;border-radius:18px;padding:20px;border:1px solid #e3edf6}
.intro-step-num{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:#0061AD;line-height:1;margin-bottom:6px}
.intro-step-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#1A3A5C;font-size:15px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.intro-step-desc{color:#666;font-size:13.5px;line-height:1.55}
.intro-start{text-align:center;margin-top:32px}
.intro-start .nav-btn.primary{padding:14px 32px;font-size:16px}

/* Path selector cards */
.intro-prompt{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;color:#8fa0b0;letter-spacing:.22em;text-transform:uppercase;margin:18px 0 4px;text-align:center}
.path-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}
@media(max-width:680px){.path-cards{grid-template-columns:1fr}}
.path-card{text-align:left;background:#f6fafd;border:2px solid #e3edf6;border-radius:20px;padding:24px 22px;cursor:pointer;transition:all .22s ease;font-family:'Barlow',sans-serif;width:100%;display:flex;flex-direction:column;gap:10px;color:inherit}
.path-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,97,173,.12)}
.path-card.task{border-color:#e3edf6}
.path-card.task:hover{border-color:#0061AD;background:#eef6fc}
.path-card.developmental{border-color:#e3edf6}
.path-card.developmental:hover{border-color:#009FA0;background:#e6f5f5}
.path-icon{width:44px;height:44px;border-radius:50%;background:#e8f2fb;color:#0061AD;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.path-icon svg{width:22px;height:22px}
.path-card.developmental .path-icon{color:#017A80;background:#dff4f4}
.path-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:#1A3A5C;line-height:1.1;letter-spacing:-.005em}
.path-desc{color:#555;font-size:14px;line-height:1.65;flex:1}
.path-meta{font-size:11.5px;font-weight:700;color:#8fa0b0;letter-spacing:.1em;text-transform:uppercase}
.path-cta{font-size:14px;font-weight:700;color:#0061AD;margin-top:4px}
.path-card.developmental .path-cta{color:#017A80}

/* ---------- Result screen ---------- */
.result-banner{border-radius:28px;padding:38px 36px;color:white;position:relative;overflow:hidden;box-shadow:0 12px 36px rgba(0,97,173,.18)}
.result-banner.mentoring{background:linear-gradient(135deg,#0061AD 0%,#1A3A5C 100%)}
.result-banner.coaching{background:linear-gradient(135deg,#009FA0 0%,#017A80 100%)}
.result-banner.directing{background:linear-gradient(135deg,#fa6b02 0%,#c04e00 100%)}
.result-banner.delegating{background:linear-gradient(135deg,#1A3A5C 0%,#0A1A2C 100%)}
.result-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:10px}
.result-title{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:64px;font-weight:800;letter-spacing:-.02em;line-height:1;margin-bottom:14px}
.result-summary{font-size:17px;line-height:1.65;max-width:640px;color:rgba(255,255,255,.95)}
.result-scores{display:flex;gap:14px;margin-top:24px;flex-wrap:wrap}
.score-pill{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);border-radius:20px;padding:8px 16px;font-size:13px;font-weight:600;letter-spacing:.04em}
.score-pill strong{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;margin-left:4px}

.result-flag{margin-top:20px;background:#fff5e8;border:1.5px solid #f5c98e;border-radius:18px;padding:18px 22px;display:flex;gap:14px;align-items:flex-start}
.result-flag-icon{flex-shrink:0;width:28px;height:28px;background:#fa6b02;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Barlow Condensed',sans-serif;font-size:18px}
.result-flag-text{font-size:14.5px;line-height:1.6;color:#5a3a10}
.result-flag-text strong{color:#3a2400}

.result-section{margin-top:28px;background:white;border-radius:24px;padding:32px;box-shadow:0 6px 20px rgba(0,97,173,.06)}
.result-section h3{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:22px;font-weight:800;color:#004B86;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.result-section h3::before{content:'';width:4px;height:22px;background:#0061AD;border-radius:2px}
.result-section.coaching h3{color:#017A80}
.result-section.coaching h3::before{background:#009FA0}
.result-section p{color:#555;line-height:1.75;font-size:15px;margin-bottom:10px}
.result-section ul{margin-left:4px;margin-top:8px;list-style:none}
.result-section li{color:#555;line-height:1.7;font-size:14.5px;padding-left:22px;position:relative;margin-bottom:6px}
.result-section li::before{content:'';position:absolute;left:4px;top:.7em;width:8px;height:8px;border-radius:50%;background:#0061AD}
.result-section.coaching li::before{background:#009FA0}

.behaviour-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:14px}
@media(max-width:600px){.behaviour-grid{grid-template-columns:1fr}}
.behaviour-card{background:#f6fafd;border-radius:14px;padding:16px 18px;border:1px solid #e3edf6}
.behaviour-card-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#1A3A5C;font-size:13px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.behaviour-card-text{color:#555;font-size:13.5px;line-height:1.55}

.next-steps{counter-reset:nstep;margin-top:14px}
.next-step{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #e8eff5}
.next-step:last-child{border-bottom:none}
.next-step-num{counter-increment:nstep;flex-shrink:0;width:32px;height:32px;background:#e8f2fb;color:#0061AD;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Barlow Condensed',sans-serif;font-size:16px}
.next-step-num::before{content:counter(nstep)}
.result-section.coaching .next-step-num{background:#dff4f4;color:#017A80}
.next-step-text{flex:1;color:#444;line-height:1.65;font-size:14.5px}
.next-step-text strong{color:#1A3A5C;font-weight:700}

/* Alternative toggle */
.alt-toggle{margin-top:20px;text-align:center}
.alt-btn{background:transparent;border:1.5px solid #c5d3e1;color:#5a6b7c;border-radius:22px;padding:11px 22px;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s ease}
.alt-btn:hover{border-color:#0061AD;color:#0061AD;background:#f0f7fd}

.alt-panel{margin-top:18px;background:#f9fbfd;border:1px solid #e3edf6;border-radius:20px;padding:24px;animation:fadeIn .3s ease both}
.alt-panel h4{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#1A3A5C;margin-bottom:8px}
.alt-panel p{color:#666;line-height:1.7;font-size:14px;margin-bottom:8px}

/* Action row */
.action-row{display:flex;gap:12px;justify-content:center;margin-top:32px;flex-wrap:wrap}
.action-btn{display:inline-flex;align-items:center;gap:10px;border:none;border-radius:24px;padding:14px 28px;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .18s ease}
.action-btn.primary{background:#0061AD;color:white;box-shadow:0 8px 24px rgba(0,97,173,.22)}
.action-btn.primary:hover{background:#004B86;transform:translateY(-1px);box-shadow:0 12px 30px rgba(0,97,173,.32)}
.action-btn.secondary{background:white;color:#0061AD;border:1.5px solid #d1e3f3}
.action-btn.secondary:hover{background:#f0f7fd;border-color:#0061AD}

/* Audio toggle */
.audio-toggle{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:white;border:1.5px solid #d1e3f3;border-radius:50%;color:#0061AD;cursor:pointer;transition:all .2s ease;padding:0}
.audio-toggle:hover{background:#f0f7fd;border-color:#0061AD;transform:scale(1.06)}
.audio-toggle.muted{color:#8fa0b0;border-color:#dde5ed;background:#f6f8fa}
.audio-toggle svg{width:18px;height:18px}

/* Magnify (larger text) toggle */
.magnify-btn{display:inline-flex;align-items:center;gap:7px;background:#fff8f0;border:2px solid #f5a84e;border-radius:20px;padding:7px 14px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;color:#b05e00;box-shadow:0 4px 14px rgba(245,168,78,.14);transition:all .18s ease;white-space:nowrap}
.magnify-btn:hover{border-color:#e07b00;background:#fef0dc;transform:translateY(-2px)}
.magnify-btn.active{background:#f5a84e;border-color:#e07b00;color:white;box-shadow:0 4px 14px rgba(245,168,78,.35)}
.magnify-btn svg{flex-shrink:0;transition:transform .18s ease}
.magnify-btn:hover svg{transform:scale(1.1)}

/* Larger text mode — toggled by .text-lg on <body>, cascades across every view */
body.text-lg .welcome-title{font-size:60px}
body.text-lg .welcome-sub{font-size:18px}
body.text-lg .welcome-btn{font-size:17px;padding:15px 34px}
body.text-lg .tag{font-size:13.5px}
body.text-lg .back-btn{font-size:14.5px;padding:9px 18px}
body.text-lg .title{font-size:52px}
body.text-lg .subtitle{font-size:18px}
body.text-lg .progress-text{font-size:13.5px}
body.text-lg .q-section{font-size:13.5px}
body.text-lg .q-text{font-size:36px}
body.text-lg .q-hint{font-size:16px}
body.text-lg .q-option{font-size:17.5px;padding:18px 22px}
body.text-lg .nav-btn{font-size:17px;padding:13px 26px}
body.text-lg .intro-card h2{font-size:30px}
body.text-lg .intro-card p{font-size:17.5px;line-height:1.78}
body.text-lg .intro-prompt{font-size:14.5px}
body.text-lg .intro-step-num{font-size:34px}
body.text-lg .intro-step-title{font-size:17px}
body.text-lg .intro-step-desc{font-size:15.5px;line-height:1.6}
body.text-lg .path-title{font-size:26px}
body.text-lg .path-desc{font-size:16px;line-height:1.7}
body.text-lg .path-meta{font-size:13px}
body.text-lg .path-cta{font-size:16px}
body.text-lg .result-eyebrow{font-size:14.5px}
body.text-lg .result-title{font-size:72px}
body.text-lg .result-summary{font-size:19px;line-height:1.7}
body.text-lg .score-pill{font-size:15px}
body.text-lg .score-pill strong{font-size:18px}
body.text-lg .result-flag-text{font-size:16px;line-height:1.7}
body.text-lg .result-section h3{font-size:24px}
body.text-lg .result-section p{font-size:16.5px;line-height:1.78}
body.text-lg .behaviour-card-title{font-size:16px}
body.text-lg .behaviour-card-text{font-size:15px;line-height:1.65}
body.text-lg .next-step-text{font-size:16px;line-height:1.7}
body.text-lg .alt-btn{font-size:14.5px}
body.text-lg .action-btn{font-size:16px;padding:13px 26px}
body.text-lg .footer-note{font-size:13.5px}
body.text-lg .magnify-btn{font-size:14.5px}

/* Mobile bumps stay sensible when larger text is on */
@media (max-width:600px){
  body.text-lg .title{font-size:42px}
  body.text-lg .q-text{font-size:28px}
  body.text-lg .result-title{font-size:54px}
}

/* Footer note */
.footer-note{text-align:center;color:#8fa0b0;font-size:12px;margin-top:36px;line-height:1.6;letter-spacing:.02em}

/* Mobile tweaks */
@media (max-width:600px){
  .container{padding:8px 18px 48px}
  .header{padding:12px 18px}
  .title{font-size:36px}
  .q-card{padding:28px 22px;border-radius:22px}
  .q-text{font-size:24px}
  .result-banner{padding:28px 24px;border-radius:22px}
  .result-title{font-size:48px}
  .result-section{padding:24px 22px;border-radius:20px}
  .intro-card{padding:32px 24px}
}
</style>
</head>
<body>

<!-- ====================== WELCOME OVERLAY ====================== -->
<div class="welcome-overlay" id="welcome-overlay">
  <div class="welcome-inner">
    <div class="welcome-logo" id="welcome-logo"></div>
    <h1 class="welcome-title">Mentor or Coach?</h1>
    <p class="welcome-sub">A short decision tool to help you choose the right developmental approach for someone in your team, grounded in the Liberator framework and Story&rsquo;s Mentoring and Coaching Programme.</p>
    <button class="welcome-btn" id="welcome-btn"><span class="welcome-pulse"></span> Begin</button>
  </div>
</div>

<div id="app"></div>

<script>
// =====================================================================

// =====================================================================
//  AUDIO
//  Matched to the Wayfinder's pattern: soft sine waves, very low gain,
//  quick attack and exponential decay. Everything stays well under .025
//  peak gain so this never intrudes on the room.
// =====================================================================
let audioCtx = null;
let audioEnabled = true;
try {
  const saved = localStorage.getItem('mc-audio');
  if (saved === 'off') audioEnabled = false;
} catch(e) {}

// Larger-text mode (accessibility) — persisted in localStorage, applied to <body>
let largeText = false;
try {
  if (localStorage.getItem('mc-text') === 'lg') largeText = true;
} catch(e) {}
if (largeText) document.body.classList.add('text-lg');

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Warm up the audio context on first gesture (autoplay policy)
document.addEventListener('click', function initAudio() {
  try { getCtx(); } catch(e) {}
  document.removeEventListener('click', initAudio);
}, { once: true });

const AUDIO_ON_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
const AUDIO_OFF_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';

function toggleAudio() {
  audioEnabled = !audioEnabled;
  try { localStorage.setItem('mc-audio', audioEnabled ? 'on' : 'off'); } catch(e) {}
  const btn = document.getElementById('audio-toggle');
  if (btn) {
    btn.innerHTML = audioEnabled ? AUDIO_ON_ICON : AUDIO_OFF_ICON;
    btn.classList.toggle('muted', !audioEnabled);
    btn.title = audioEnabled ? 'Sound on, click to mute' : 'Sound off, click to enable';
  }
  if (audioEnabled) playClick();
}

// SVG icons for the magnify (larger text) toggle — magnifier with + for on, with - for off
const MAGNIFY_PLUS_ICON  = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
const MAGNIFY_MINUS_ICON = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';

function toggleLargeText() {
  largeText = !largeText;
  document.body.classList.toggle('text-lg', largeText);
  try { localStorage.setItem('mc-text', largeText ? 'lg' : 'normal'); } catch(e) {}
  const btn = document.getElementById('magnify-btn');
  if (btn) {
    btn.classList.toggle('active', largeText);
    btn.innerHTML = (largeText ? MAGNIFY_MINUS_ICON : MAGNIFY_PLUS_ICON) + (largeText ? ' Reset text' : ' Larger text');
    btn.title = largeText ? 'Reset text to default size' : 'Magnify text across all pages';
  }
  playClick();
}

// Soft single tick, used for option selection and small confirmations.
function playClick() {
  if (!audioEnabled) return;
  try {
    const ctx = getCtx(), now = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 880;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.012, now + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.09);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.1);
  } catch(e) {}
}

// Two-note ascending chime, used for moving forward / starting.
function playAdvance() {
  if (!audioEnabled) return;
  try {
    const ctx = getCtx(), now = ctx.currentTime;
    [{ f: 523.25, d: 0 }, { f: 783.99, d: 0.07 }].forEach(({ f, d }) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, now + d);
      g.gain.linearRampToValueAtTime(0.02, now + d + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + d + 0.5);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now + d); osc.stop(now + d + 0.55);
    });
  } catch(e) {}
}

// Two-note descending chime, used for back / start-over.
function playReturn() {
  if (!audioEnabled) return;
  try {
    const ctx = getCtx(), now = ctx.currentTime;
    [{ f: 783.99, d: 0 }, { f: 523.25, d: 0.09 }].forEach(({ f, d }) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, now + d);
      g.gain.linearRampToValueAtTime(0.022, now + d + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, now + d + 0.55);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now + d); osc.stop(now + d + 0.6);
    });
  } catch(e) {}
}

// Three-note major-chord swell for the result reveal.
function playReveal() {
  if (!audioEnabled) return;
  try {
    const ctx = getCtx(), now = ctx.currentTime;
    [{ f: 523.25, d: 0 }, { f: 659.25, d: 0.06 }, { f: 783.99, d: 0.12 }].forEach(({ f, d }) => {
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = f;
      g.gain.setValueAtTime(0, now + d);
      g.gain.linearRampToValueAtTime(0.018, now + d + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, now + d + 1.0);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(now + d); osc.stop(now + d + 1.1);
    });
  } catch(e) {}
}

// Soft descending tone for the PDF download moment.
function playDownload() {
  if (!audioEnabled) return;
  try {
    const ctx = getCtx(), now = ctx.currentTime;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(660, now);
    osc.frequency.exponentialRampToValueAtTime(330, now + 0.25);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.022, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(now); osc.stop(now + 0.32);
  } catch(e) {}
}

let state = {
  view: 'intro',  // 'intro' | 'question' | 'result'
  path: null,     // 'task' | 'developmental'

  answers: []     // sized when path is chosen

function startPath(path) {
  state.path = path;

  state.qIndex = 0;

function buildQuestion() {
  const container = document.createElement('div');
  container.className = 'container';

  const QS = getQuestions();
  const q = QS[state.qIndex];
  const total = QS.length;
  const pct = ((state.qIndex) / total) * 100;
  const answeredPct = (state.answers.filter(a => a !== null).length / total) * 100;

  // Progress bar
  const progress = document.createElement('div');
  progress.className = 'progress-wrap';
  progress.innerHTML =
    '<div class="progress-text">Question ' + (state.qIndex + 1) + ' of ' + total + '</div>' +
    '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.max(pct, answeredPct) + '%"></div></div>';
  container.appendChild(progress);

  // Question card
  const card = document.createElement('div');
  card.className = 'q-card';

  const sectionEl = document.createElement('div');
  sectionEl.className = 'q-section ' + (q.sectionClass || '');
  sectionEl.textContent = q.section;
  card.appendChild(sectionEl);

  const textEl = document.createElement('div');
  textEl.className = 'q-text';
  textEl.textContent = q.text;
  card.appendChild(textEl);

  if (q.hint) {
    const hintEl = document.createElement('div');
    hintEl.className = 'q-hint';
    hintEl.textContent = q.hint;
    card.appendChild(hintEl);
  }

  const optionsEl = document.createElement('div');
  optionsEl.className = 'q-options';

  const currentAnswer = state.answers[state.qIndex];

  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'q-option' + (currentAnswer && currentAnswer.optionIdx === idx ? ' selected' : '');
    btn.innerHTML = '<span class="q-option-dot"></span><span>' + opt.label + '</span>';
    btn.addEventListener('click', () => {
      playClick();
      state.answers[state.qIndex] = Object.assign({ optionIdx: idx }, opt);
      // Auto-advance after a short pause for visual confirmation
      render();
      setTimeout(() => {
        if (state.qIndex < QS.length - 1) {
          playAdvance();
          state.qIndex += 1;
        } else {
          playReveal();
          state.view = 'result';
        }
        render();
      }, 380);
    });
    optionsEl.appendChild(btn);
  });
  card.appendChild(optionsEl);

  // Back button (only; forward motion is handled by auto-advance)
  const nav = document.createElement('div');
  nav.className = 'q-nav';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'nav-btn';
  prevBtn.innerHTML = '&larr; Back';
  prevBtn.disabled = state.qIndex === 0;
  prevBtn.addEventListener('click', () => {
    if (state.qIndex > 0) { playReturn(); state.qIndex -= 1; render(); }
  });
  nav.appendChild(prevBtn);

  card.appendChild(nav);
  container.appendChild(card);

  return container;
}

// =====================================================================
//  SCORING
// =====================================================================
function computeScores() {
  if (state.path === 'developmental') {
    return computeDevScores();
  }
  const canDoAnswers = state.answers.filter((_, i) => QUESTIONS[i].dimension === 'canDo');
  const willDoAnswers = state.answers.filter((_, i) => QUESTIONS[i].dimension === 'willDo');
  const approachAnswers = state.answers.filter((_, i) => QUESTIONS[i].dimension === 'approach');

  const canDoAvg = canDoAnswers.reduce((s, a) => s + a.score, 0) / canDoAnswers.length;
  const willDoAvg = willDoAnswers.reduce((s, a) => s + a.score, 0) / willDoAnswers.length;
  const approachSum = approachAnswers.reduce((s, a) => s + a.coachBias, 0); // 0 to 40

  // Build a 0-100 coaching score
  // canDo: weight 35
  // willDo: weight 25
  // approach: weight 40 (already 0-40 from 4x0-10)
  const canDoContrib = ((canDoAvg - 1) / 3) * 35;
  const willDoContrib = ((willDoAvg - 1) / 3) * 25;
  const coachScore = canDoContrib + willDoContrib + approachSum;

  // Recommendation
  let recommendation, certainty;
  if (coachScore >= 60) {
    recommendation = 'coaching';
    certainty = coachScore >= 75 ? 'strong' : 'clear';
  } else if (coachScore >= 50) {
    recommendation = 'coaching';
    certainty = 'borderline';
  } else if (coachScore >= 40) {
    recommendation = 'mentoring';
    certainty = 'borderline';
  } else {
    recommendation = 'mentoring';
    certainty = coachScore <= 25 ? 'strong' : 'clear';
  }

  // Flags for edge cases
  let flag = null;
  if (canDoAvg <= 1.5 && willDoAvg <= 1.6) {
    flag = 'directing';
  } else if (canDoAvg >= 3.7 && willDoAvg >= 3.7 && approachSum >= 32) {
    flag = 'delegating';
  }

  return { canDoAvg, willDoAvg, approachSum, coachScore, recommendation, certainty, flag, path: 'task' };
}

// Developmental path: questions all share a single coachBias dimension.
// Raw sum of 6 questions ranges 6 to 54 (each option scored 1 to 9 typically).
// Normalised to 0-100.
function computeDevScores() {
  const sum = state.answers.reduce((s, a) => s + a.coachBias, 0);
  // Theoretical min/max based on the actual options provided
  let minTotal = 0, maxTotal = 0;
  DEV_QUESTIONS.forEach(q => {
    const biases = q.options.map(o => o.coachBias);
    minTotal += Math.min.apply(null, biases);
    maxTotal += Math.max.apply(null, biases);
  });
  const coachScore = ((sum - minTotal) / (maxTotal - minTotal)) * 100;

  const recommendation = coachScore >= 50 ? 'coaching' : 'mentoring';
  const dist = Math.abs(coachScore - 50);
  const certainty = dist >= 25 ? 'strong' : dist >= 10 ? 'clear' : 'borderline';

  // Pull out the chosen goal and level labels for the result pills
  const goalLabel = state.answers[0].goalLabel || '';
  const levelLabel = state.answers[1].levelLabel || '';

  return { coachScore, recommendation, certainty, flag: null, goalLabel, levelLabel, path: 'developmental' };
}

// =====================================================================
//  RATIONALE
// =====================================================================
function buildRationale(scores) {
  if (scores.path === 'developmental') {
    return buildDevRationale(scores);
  }
  const { canDoAvg, willDoAvg, recommendation, approachSum } = scores;

  // Plain language labels for the averages
  const canDoLabel = canDoAvg < 1.7 ? 'low'
                   : canDoAvg < 2.6 ? 'moderate'
                   : canDoAvg < 3.4 ? 'good'
                   : 'high';
  const willDoLabel = willDoAvg < 1.7 ? 'low'
                    : willDoAvg < 2.6 ? 'moderate to good'
                    : willDoAvg < 3.4 ? 'good to high'
                    : 'high';

  // Pull specific answers to reflect back
  const teachAnswer = state.answers[3];     // teach colleague
  const expertiseAnswer = state.answers[8]; // who holds expertise
  const goalAnswer = state.answers[9];      // goal
  const directionAnswer = state.answers[10];// close direction response
  const focusAnswer = state.answers[11];    // focus of support

  const lines = [];

  lines.push('You described their <strong>Can Do</strong> as <strong>' + canDoLabel + '</strong> and their <strong>Will Do</strong> as <strong>' + willDoLabel + '</strong>.');

  if (recommendation === 'mentoring') {
    if (canDoAvg < 2.6) {
      lines.push('Their capability is still developing, which usually means they benefit from someone in the room who can share knowledge, model good judgement and stay close to the decision-making.');
    } else {
      lines.push('Even though their capability is reasonable, the wider context suggests a mentoring approach is the better fit.');
    }

    if (expertiseAnswer.coachBias <= 3) {
      lines.push('You hold more expertise on this topic, which gives you genuine ground to mentor from.');
    }
    if (goalAnswer.coachBias <= 3) {
      lines.push('Your goal is knowledge transfer and shaping judgement, which sits at the heart of what mentoring does.');
    }
    if (directionAnswer.coachBias <= 4) {
      lines.push('You also noted that close direction would still be welcomed. That tells you they are not yet at the point where stepping back would help.');
    }
    if (focusAnswer.coachBias <= 3) {
      lines.push('The focus is on longer-term growth, which is exactly what a mentoring relationship is set up for.');
    }
  } else {
    if (canDoAvg >= 2.6 && willDoAvg >= 2.6) {
      lines.push('Their capability and motivation are well established. They have the foundation to work through things themselves, with a skilled thinking partner alongside them.');
    } else {
      lines.push('Even though the Can Do and Will Do scores are not at the very top, the wider context suggests coaching is the better fit.');
    }

    if (expertiseAnswer.coachBias >= 7) {
      lines.push('You noted that on this specific topic they hold equal or greater expertise. That is a classic coaching signal: your value is in helping them think, not in providing answers.');
    }
    if (goalAnswer.coachBias >= 7) {
      lines.push('The goal is to sharpen judgement they already have, rather than to transfer knowledge.');
    }
    if (directionAnswer.coachBias >= 7) {
      lines.push('You also flagged that close direction would feel intrusive or counterproductive. That is the moment to step back and let them lead the thinking.');
    }
    if (focusAnswer.coachBias >= 7) {
      lines.push('The focus is a specific performance area, where coaching conversations can move quickly and concretely.');
    }
  }

  return lines.join(' ');
}

function buildDevRationale(scores) {

  } else {
    // Reasons that push toward coaching
    if (goalA.coachBias >= 7) {
      lines.push('That kind of growth comes from being asked the right questions, not given the right answers. Coaching is built for it.');
    }
    if (levelA.coachBias >= 6) {

    }
    if (styleA.coachBias >= 6) {
      lines.push('You think questions and reflection would help them more than experience sharing, which points firmly at coaching.');
    }
    if (awareA.coachBias >= 6) {

    }
    if (relA.coachBias >= 6) {

    }
    if (timeA.coachBias >= 6) {
      lines.push('The shorter, goal-focused time horizon fits how coaching works at its best.');

  }

  return lines.join(' ');
}

  return container;

function scoreLabel(avg) {
  if (avg < 1.7) return 'Low';
  if (avg < 2.6) return 'Moderate';
  if (avg < 3.4) return 'Good';
  return 'High';
}

// =====================================================================
//  PDF GENERATION
//  Modelled on the Wayfinder's Skill/Will Course of Action PDF.
//  Single page, plain text PDF, fully self-contained.
// =====================================================================
function generatePDF(scores, content) {
  try {
    const W = 595, H = 842, M = 50; // A4 in points
    let objCount = 0;
    const objects = [];
    function addObj(data) {
      objCount++;
      objects.push({ id: objCount, data });
      return objCount;
    }

    function escPDF(str) {
      return String(str).replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)');
    }

    // Decode common HTML entities for PDF text output, since stripping tags
    // alone leaves things like &amp; in the output.
    function decodeEntities(str) {
      return String(str)
        .replace(/&amp;/g, '&')
        .replace(/&rsquo;/g, "'")
        .replace(/&lsquo;/g, "'")
        .replace(/&rdquo;/g, '"')
        .replace(/&ldquo;/g, '"')
        .replace(/&middot;/g, '.')
        .replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&hellip;/g, '...')
        .replace(/&ndash;/g, '-')
        .replace(/&mdash;/g, '-');
    }

    // Convenience: strip tags and decode entities in one go.
    function plain(str) {
      return decodeEntities(String(str).replace(/<[^>]+>/g, ''));
    }

    function wrap(text, width, fontSize) {
      // Rough character width estimate for Helvetica
      const approxChars = Math.floor(width / (fontSize * 0.5));
      const words = text.split(/\s+/);
      const lines = [];
      let cur = '';
      for (const w of words) {
        if ((cur + ' ' + w).trim().length > approxChars) {
          if (cur) lines.push(cur);
          cur = w;
        } else {
          cur = (cur + ' ' + w).trim();
        }
      }
      if (cur) lines.push(cur);
      return lines;
    }

    // Story Blue / Teal hex to RGB 0-1
    const blue = scores.recommendation === 'mentoring' ? '0 0.38 0.68' : '0 0.62 0.63';
    const dark = '0.10 0.22 0.36';
    const grey = '0.45 0.50 0.56';
    const lightGrey = '0.82 0.86 0.91';

    let s = '';

    // Top accent bar
    s += blue + ' rg\n';
    s += '0 ' + (H - 12) + ' ' + W + ' 12 re f\n';

    // Title
    let y = H - 60;
    s += dark + ' rg\nBT /F1 22 Tf ' + M + ' ' + y + ' Td (Mentor or Coach?) Tj ET\n';
    y -= 22;
    s += grey + ' rg\nBT /F2 10 Tf ' + M + ' ' + y + ' Td (Decision summary - Story Contracting Learning ' + String.fromCharCode(38) + ' Development) Tj ET\n';
    y -= 28;

    // Recommendation box
    s += blue + ' rg\n' + M + ' ' + (y - 60) + ' ' + (W - 2*M) + ' 60 re f\n';
    s += '1 1 1 rg\nBT /F1 11 Tf ' + (M + 14) + ' ' + (y - 18) + ' Td (RECOMMENDED APPROACH) Tj ET\n';
    s += '1 1 1 rg\nBT /F1 26 Tf ' + (M + 14) + ' ' + (y - 46) + ' Td (' + content.title + ') Tj ET\n';
    y -= 80;

    // Scores row
    const scoreRow = scores.path === 'developmental'
      ? 'Goal: ' + scores.goalLabel + '    |    Experience: ' + scores.levelLabel + '    |    Coaching fit: ' + Math.round(scores.coachScore) + '/100'
      : 'Can Do: ' + scoreLabel(scores.canDoAvg) + '    |    Will Do: ' + scoreLabel(scores.willDoAvg) + '    |    Coaching score: ' + Math.round(scores.coachScore) + '/100';
    s += dark + ' rg\nBT /F1 10 Tf ' + M + ' ' + y + ' Td (' + escPDF(scoreRow) + ') Tj ET\n';
    y -= 24;

    // Why this fits
    s += dark + ' rg\nBT /F1 13 Tf ' + M + ' ' + y + ' Td (Why this fits) Tj ET\n';
    y -= 6;
    s += blue + ' rg\n' + M + ' ' + y + ' ' + 40 + ' 2 re f\n';
    y -= 14;

    // Strip HTML tags for PDF body
    const rationaleText = plain(buildRationale(scores));
    const rLines = wrap(rationaleText, W - 2*M, 11);
    s += dark + ' rg\n';
    rLines.forEach(line => {
      s += 'BT /F2 11 Tf ' + M + ' ' + y + ' Td (' + escPDF(line) + ') Tj ET\n';
      y -= 15;
    });
    y -= 10;

    // Definition / summary
    s += dark + ' rg\nBT /F1 13 Tf ' + M + ' ' + y + ' Td (What ' + content.title + ' means) Tj ET\n';
    y -= 6;
    s += blue + ' rg\n' + M + ' ' + y + ' ' + 40 + ' 2 re f\n';
    y -= 14;
    const dLines = wrap(content.summary, W - 2*M, 11);
    s += dark + ' rg\n';
    dLines.forEach(line => {
      s += 'BT /F2 11 Tf ' + M + ' ' + y + ' Td (' + escPDF(line) + ') Tj ET\n';
      y -= 15;
    });
    y -= 10;

    // Key behaviours
    s += dark + ' rg\nBT /F1 13 Tf ' + M + ' ' + y + ' Td (Key behaviours) Tj ET\n';
    y -= 6;
    s += blue + ' rg\n' + M + ' ' + y + ' ' + 40 + ' 2 re f\n';
    y -= 16;
    content.behaviours.forEach(b => {
      s += dark + ' rg\nBT /F1 10 Tf ' + M + ' ' + y + ' Td (' + escPDF(b.title) + ') Tj ET\n';
      y -= 13;
      const bLines = wrap(b.text, W - 2*M - 10, 10);
      bLines.forEach(line => {
        s += dark + ' rg\nBT /F2 10 Tf ' + (M + 10) + ' ' + y + ' Td (' + escPDF(line) + ') Tj ET\n';
        y -= 13;
      });
      y -= 4;
    });
    y -= 6;

    // Next steps
    s += dark + ' rg\nBT /F1 13 Tf ' + M + ' ' + y + ' Td (What to do next) Tj ET\n';
    y -= 6;
    s += blue + ' rg\n' + M + ' ' + y + ' ' + 40 + ' 2 re f\n';
    y -= 16;
    content.nextSteps.forEach((step, i) => {
      const cleanStep = plain(step);
      const stepText = (i + 1) + '. ' + cleanStep;
      const sLines = wrap(stepText, W - 2*M, 10);
      sLines.forEach((line, li) => {
        s += dark + ' rg\nBT /F2 10 Tf ' + (li === 0 ? M : M + 12) + ' ' + y + ' Td (' + escPDF(line) + ') Tj ET\n';
        y -= 13;
      });
      y -= 3;
    });

    // Footer
    s += grey + ' rg\nBT /F2 8 Tf ' + M + ' ' + (M - 10) + ' Td (' + escPDF('Story Contracting L&D | Mentoring & Coaching Programme | Aligned to The Liberator | Generated ' + new Date().toLocaleDateString('en-GB')) + ') Tj ET\n';

    // Assemble PDF
    const catalogId = addObj('<< /Type /Catalog /Pages 2 0 R >>');
    const pagesId = addObj('');
    const font1Id = addObj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
    const font2Id = addObj('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
    const streamBytes = new TextEncoder().encode(s);
    const streamId = addObj('<< /Length ' + streamBytes.length + ' >>\nstream\n' + s + 'endstream');
    const pageId = addObj('<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ' + W + ' ' + H + '] /Contents ' + streamId + ' 0 R /Resources << /Font << /F1 ' + font1Id + ' 0 R /F2 ' + font2Id + ' 0 R >> >> >>');
    objects[1].data = '<< /Type /Pages /Kids [' + pageId + ' 0 R] /Count 1 >>';

    let pdf = '%PDF-1.4\n';
    const offsets = [];
    objects.forEach(obj => {
      offsets.push(pdf.length);
      pdf += obj.id + ' 0 obj\n' + obj.data + '\nendobj\n';
    });
    const xo = pdf.length;
    pdf += 'xref\n0 ' + (objCount + 1) + '\n0000000000 65535 f \n';
    offsets.forEach(off => { pdf += String(off).padStart(10, '0') + ' 00000 n \n'; });
    pdf += 'trailer\n<< /Size ' + (objCount + 1) + ' /Root ' + catalogId + ' 0 R >>\nstartxref\n' + xo + '\n%%EOF';

    const blob = new Blob([pdf], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Mentor-or-Coach-' + content.title + '-' + new Date().toISOString().slice(0, 10) + '.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    console.error('PDF generation error:', e);
    alert('Sorry, there was a problem generating your PDF. Please try again.');
  }
}

//  BOOT
// =====================================================================
document.getElementById('welcome-btn').addEventListener('click', () => {
  playAdvance();
  document.getElementById('welcome-overlay').classList.add('dismissed');
  render();
});
document.getElementById('welcome-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'welcome-overlay') {
    playAdvance();
    document.getElementById('welcome-overlay').classList.add('dismissed');
    render();
  }
});

// Render initial intro behind the overlay
render();
</script>
